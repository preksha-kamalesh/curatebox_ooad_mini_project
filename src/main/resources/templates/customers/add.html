<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add New Customer | CurateBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container animate-slide-up">
    <!-- Page Header -->
    <div class="page-header d-flex justify-content-between align-items-center mb-5 mt-5">
        <div>
            <h2 class="mb-1 text-white">Create Customer Profile</h2>
            <p class="text-white opacity-75 mb-0">Add a new customer and activate their initial subscription.</p>
        </div>
        <a href="/customers" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left me-2"></i> Back
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="glass-card p-5">
                <form th:action="@{/customers/add}" method="post" th:object="${customer}">
                    
                    <h5 class="mb-4 text-primary"><i class="fa-solid fa-user me-2"></i> Personal Details</h5>
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-muted text-uppercase small fw-bold tracking-wide">First Name</label>
                            <input type="text" class="form-control custom-input" th:field="*{firstName}" placeholder="E.g. Ava" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted text-uppercase small fw-bold tracking-wide">Last Name</label>
                            <input type="text" class="form-control custom-input" th:field="*{lastName}" placeholder="E.g. Sharma" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted text-uppercase small fw-bold tracking-wide">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0 px-4"><i class="fa-solid fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control custom-input border-start-0" th:field="*{email}" placeholder="example@curatebox.com" required>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="form-label text-muted text-uppercase small fw-bold tracking-wide">Shipping Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0 px-4"><i class="fa-solid fa-location-dot text-muted"></i></span>
                            <input type="text" class="form-control custom-input border-start-0" th:field="*{shippingAddress}" placeholder="123 Palm Street QA" required>
                        </div>
                    </div>

                    <h5 class="mb-4 text-primary mt-4 pt-4 border-top"><i class="fa-solid fa-box-open me-2"></i> Subscription Details</h5>
                    <div class="mb-5">
                        <label class="form-label text-muted text-uppercase small fw-bold tracking-wide">Select Plan Type</label>
                        <select class="form-select custom-input" name="planType" required>
                            <option value="Basic" selected>Basic Plan</option>
                            <option value="Premium">Premium Plan</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-end gap-3 mt-4 pt-4 border-top">
                        <a href="/customers" class="btn btn-light px-4 py-2 border">Cancel</a>
                        <button class="btn btn-primary px-4 py-2 shadow-sm" type="submit">
                            <i class="fa-solid fa-floppy-disk me-2"></i> Create Profile & Subscription
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
