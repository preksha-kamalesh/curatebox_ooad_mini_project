<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customers | CurateBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container animate-slide-up">
    <!-- Page Header -->
    <div class="page-header d-flex justify-content-between align-items-center mb-5 mt-5">
        <div>
            <h2 class="mb-1 text-white">Customers Directory</h2>
            <p class="text-white opacity-75 mb-0">Manage subscriptions, preferences, and profiles.</p>
        </div>
        <div class="d-flex gap-2">
            <a href="/customers/add" class="btn btn-primary shadow-sm" style="background-color: var(--primary); border: none;">
                <i class="fa-solid fa-plus me-2"></i> Add New Customer
            </a>
            <a href="/dashboard" class="btn btn-outline-secondary text-white border-white">
                <i class="fa-solid fa-arrow-left me-2"></i> Dashboard
            </a>
        </div>
    </div>

    <!-- Alert -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm border-0" role="alert">
        <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Data Table -->
    <div class="table-container">
        <div class="table-responsive">
            <table class="table modern-table mb-0">
                <thead>
                <tr>
                    <th>Customer</th>
                    <th>Email Address</th>
                    <th>Shipping Address</th>
                    <th class="text-center">Quick Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${customers}">
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px; color: var(--primary);">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <div>
                                <span class="fw-bold d-block" style="color: var(--dark)" th:text="${c.firstName + ' ' + c.lastName}"></span>
                                <small class="text-muted d-block">ID: #<span th:text="${c.customerId}"></span></small>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span th:text="${c.email}"></span>
                    </td>
                    <td>
                        <span class="text-truncate d-inline-block" style="max-width: 250px;" th:text="${c.shippingAddress}"></span>
                    </td>
                    <td>
                        <div class="d-flex gap-2 justify-content-center">
                            <a th:href="@{/customers/{id}/edit(id=${c.customerId})}" class="btn btn-outline-dark-sec action-btn" data-bs-toggle="tooltip" title="Edit Profile">
                                <i class="fa-solid fa-pen"></i>
                            </a>
                            <a th:href="@{/customers/{id}/preferences(id=${c.customerId})}" class="btn action-btn text-warning bg-warning bg-opacity-10 border-0" data-bs-toggle="tooltip" title="Preferences">
                                <i class="fa-solid fa-sliders"></i>
                            </a>
                            <a th:href="@{/customers/{id}/subscription(id=${c.customerId})}" class="btn action-btn text-info bg-info bg-opacity-10 border-0" data-bs-toggle="tooltip" title="Subscription Status">
                                <i class="fa-solid fa-box-open"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Initialize tooltips
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
      return new bootstrap.Tooltip(tooltipTriggerEl)
    })
</script>
</body>
</html>
