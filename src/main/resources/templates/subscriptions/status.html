<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Subscription Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white">
<div class="container py-4">
    <h2 class="mb-4">Subscription Status</h2>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="card mb-4">
        <div class="card-body">
            <p><strong>Plan:</strong> <span th:text="${subscription.planType}"></span></p>
            <p><strong>Status:</strong> <span th:text="${subscription.status}"></span></p>
            <p><strong>Start Date:</strong> <span th:text="${subscription.startDate}"></span></p>
            <p><strong>End Date:</strong> <span th:text="${subscription.endDate}"></span></p>
        </div>
    </div>

    <div class="d-flex gap-2 flex-wrap">
        <form th:action="@{/subscriptions/{id}/pause(id=${subscription.subscriptionId})}" method="post">
            <button class="btn btn-warning" type="submit">Pause</button>
        </form>
        <form th:action="@{/subscriptions/{id}/resume(id=${subscription.subscriptionId})}" method="post">
            <button class="btn btn-success" type="submit">Resume</button>
        </form>
        <form th:action="@{/subscriptions/{id}/cancel(id=${subscription.subscriptionId})}" method="post">
            <button class="btn btn-danger" type="submit">Cancel</button>
        </form>
        <a th:href="@{/customers}" class="btn btn-outline-secondary">Back to Customers</a>
    </div>
</div>
</body>
</html>
