<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Subscription Status | CurateBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container animate-slide-up">
    <!-- Page Header -->
    <div class="page-header d-flex justify-content-between align-items-center mb-5 mt-5">
        <div>
            <h2 class="mb-1 text-white">Subscription Management</h2>
            <p class="text-white opacity-75 mb-0">View or modify current subscription plan.</p>
        </div>
        <a href="/customers" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left me-2"></i> Customers
        </a>
    </div>

    <!-- Alert -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm border-0" role="alert">
        <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0" role="alert">
        <i class="fa-solid fa-triangle-exclamation me-2"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            
            <!-- Subscription Details Card -->
            <div class="glass-card mb-5">
                <div class="p-4 border-bottom bg-light bg-opacity-50 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 text-dark fw-bold"><i class="fa-solid fa-ticket-alt me-2 text-primary"></i> Current Plan Details</h5>
                    
                    <!-- Dynamic Badge Rendering -->
                    <span th:if="${subscription.status == 'ACTIVE'}" class="status-badge status-active">
                        <i class="fa-solid fa-circle-check me-1"></i> Active
                    </span>
                    <span th:if="${subscription.status == 'PAUSED'}" class="status-badge status-paused">
                        <i class="fa-solid fa-circle-pause me-1"></i> Paused
                    </span>
                    <span th:if="${subscription.status == 'CANCELLED'}" class="status-badge status-cancelled">
                        <i class="fa-solid fa-circle-xmark me-1"></i> Cancelled
                    </span>
                </div>
                
                <div class="p-5">
                    <div class="row mb-4">
                        <div class="col-6">
                            <p class="text-uppercase text-muted small fw-bold tracking-wide mb-1">Plan Tier</p>
                            <h4 class="text-dark fw-bold" th:text="${subscription.planType}"></h4>
                        </div>
                        <div class="col-6">
                            <p class="text-uppercase text-muted small fw-bold tracking-wide mb-1">Status</p>
                            <h4 class="text-dark fw-bold" th:text="${subscription.status}"></h4>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-6">
                            <p class="text-uppercase text-muted small fw-bold tracking-wide mb-1">Start Date</p>
                            <div class="d-flex justify-content-start align-items-center">
                                <i class="fa-regular fa-calendar text-muted me-2"></i>
                                <span class="fs-5 text-dark" th:text="${subscription.startDate}"></span>
                            </div>
                        </div>
                        <div class="col-6">
                            <p class="text-uppercase text-muted small fw-bold tracking-wide mb-1">End Date</p>
                            <div class="d-flex justify-content-start align-items-center">
                                <i class="fa-regular fa-calendar-xmark text-muted me-2"></i>
                                <span class="fs-5 text-dark" th:text="${subscription.endDate}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Controls -->
            <div class="d-flex gap-3 justify-content-center p-4 bg-white rounded-4 shadow-sm border mb-5">
                <form th:action="@{/subscriptions/{id}/pause(id=${subscription.subscriptionId})}" method="post">
                    <button class="btn border shadow-sm px-4 fw-bold text-dark action-btn hover-bg-light" style="background-color: #f8f9fa;" type="submit" th:disabled="${subscription.status == 'PAUSED' or subscription.status == 'CANCELLED'}">
                        <i class="fa-solid fa-pause text-warning me-2"></i> Pause Plan
                    </button>
                </form>
                <form th:action="@{/subscriptions/{id}/resume(id=${subscription.subscriptionId})}" method="post">
                    <button class="btn btn-success shadow-sm px-4 fw-bold action-btn" type="submit" th:disabled="${subscription.status == 'ACTIVE' or subscription.status == 'CANCELLED'}">
                        <i class="fa-solid fa-play me-2"></i> Resume Plan
                    </button>
                </form>
                <form th:action="@{/subscriptions/{id}/cancel(id=${subscription.subscriptionId})}" method="post" onsubmit="return confirm('Are you sure you want to completely cancel this subscription? This action cannot be easily reversed.');">
                    <button class="btn btn-danger shadow-sm px-4 fw-bold action-btn" type="submit" th:disabled="${subscription.status == 'CANCELLED'}">
                        <i class="fa-solid fa-xmark me-2"></i> Cancel Plan
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
