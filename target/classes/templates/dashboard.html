<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CurateBox Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container animate-slide-up">
    <div class="page-header text-center">
        <h1 class="display-4 fw-bold mb-3"><i class="fa-solid fa-box-open me-3"></i>CurateBox</h1>
        <p class="lead opacity-75">Premium Subscription Management Platform</p>
    </div>

    <div class="row justify-content-center mt-5">
        <div class="col-lg-8">
            <div class="glass-card p-5 text-center">
                <h2 class="mb-4">Admin Dashboard</h2>
                
                <div class="row mt-5">
                    <div class="col-md-6 mb-4">
                        <a href="/customers" class="dash-card justify-content-center">
                            <div class="text-center">
                                <div class="mb-3">
                                    <i class="fa-solid fa-users fa-3x" style="color: var(--primary)"></i>
                                </div>
                                <h3>Manage Customers</h3>
                                <p class="text-muted mt-2">View profiles, subscriptions, and preferences</p>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-6 mb-4">
                        <a href="/inventory" class="dash-card justify-content-center">
                            <div class="text-center">
                                <div class="mb-3">
                                    <i class="fa-solid fa-boxes-packing fa-3x" style="color: var(--primary)"></i>
                                </div>
                                <h3>Manage Inventory</h3>
                                <p class="text-muted mt-2">View products, suppliers, and stock levels</p>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
