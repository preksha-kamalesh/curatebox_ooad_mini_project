<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Customers</h2>
        <a href="/dashboard" class="btn btn-outline-secondary">Back to Dashboard</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <table class="table table-bordered table-striped align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Address</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${customers}">
            <td th:text="${c.customerId}"></td>
            <td th:text="${c.firstName + ' ' + c.lastName}"></td>
            <td th:text="${c.email}"></td>
            <td th:text="${c.shippingAddress}"></td>
            <td class="d-flex gap-2">
                <a th:href="@{/customers/{id}/edit(id=${c.customerId})}" class="btn btn-sm btn-primary">Edit</a>
                <a th:href="@{/customers/{id}/preferences(id=${c.customerId})}" class="btn btn-sm btn-warning">Preferences</a>
                <a th:href="@{/customers/{id}/subscription(id=${c.customerId})}" class="btn btn-sm btn-info">Subscription</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
