<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customer Preferences | CurateBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container animate-slide-up">
    <!-- Page Header -->
    <div class="page-header d-flex justify-content-between align-items-center mb-5 mt-5">
        <div>
            <h2 class="mb-1 text-white">Preference Profile</h2>
            <p class="text-white opacity-75 mb-0">Managing preferences for <span class="fw-bold" th:text="${customer.firstName + ' ' + customer.lastName}"></span></p>
        </div>
        <a href="/customers" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left me-2"></i> Back
        </a>
    </div>

    <!-- Alert -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm border-0" role="alert">
        <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0" role="alert">
        <i class="fa-solid fa-triangle-exclamation me-2"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <form th:action="@{/customers/{id}/preferences(id=${customer.customerId})}" th:object="${preferenceForm}" method="post">
        
        <div class="table-container p-4">
            <h4 class="mb-4 text-dark"><i class="fa-solid fa-list-check me-2 text-primary"></i> Category Preferences</h4>
            <div class="table-responsive">
                <table class="table modern-table mb-0 align-middle">
                    <thead>
                    <tr>
                        <th style="width: 40%">Preference Option</th>
                        <th style="width: 30%">Category</th>
                        <th class="text-center" style="width: 30%">Your Choice</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="opt, stat : ${options}">
                        <td>
                            <div class="d-flex align-items-center">
                                <i class="fa-solid fa-tag text-muted me-3"></i>
                                <span class="fw-bold text-dark" th:text="${opt.preferenceValue}"></span>
                            </div>
                        </td>
                        <td>
                            <span class="badge bg-light text-dark border px-3 py-2" style="font-weight: 500;" th:text="${opt.category}"></span>
                        </td>
                        <td>
                            <div class="d-flex justify-content-center">
                                <div class="radio-toggle-group">
                                    <label class="radio-toggle">
                                        <input type="radio" th:field="*{preferences[__${stat.index}__].selection}" value="like">
                                        <span class="toggle-label"><i class="fa-solid fa-thumbs-up me-1"></i> Like</span>
                                    </label>
                                    <label class="radio-toggle">
                                        <input type="radio" th:field="*{preferences[__${stat.index}__].selection}" value="dislike">
                                        <span class="toggle-label"><i class="fa-solid fa-thumbs-down me-1"></i> Dislike</span>
                                    </label>
                                </div>
                            </div>
                        </td>
                        <!-- Hidden Map Key -->
                        <input type="hidden" th:field="*{preferences[__${stat.index}__].preferenceOptionId}" th:value="${opt.preferenceId}">
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="d-flex justify-content-end gap-3 mt-4 mb-5">
            <a href="/customers" class="btn btn-light px-4 py-2 border">Cancel</a>
            <button type="submit" class="btn btn-primary px-4 py-2 shadow-sm">
                <i class="fa-solid fa-floppy-disk me-2"></i> Save Preferences
            </button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
