<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customer Preferences</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white">
<div class="container py-4">
    <h2 class="mb-2">Preferences</h2>
    <p class="text-muted" th:text="${customer.firstName + ' ' + customer.lastName}"></p>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <form th:action="@{/customers/{id}/preferences(id=${customer.customerId})}" method="post">
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead>
                <tr>
                    <th>Option</th>
                    <th>Category</th>
                    <th>Like</th>
                    <th>Dislike</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="opt, stat : ${options}">
                    <td th:text="${opt.preferenceValue}"></td>
                    <td th:text="${opt.category}"></td>
                    <td>
                        <input class="form-check-input" type="radio"
                               th:name="${'preferences[' + stat.index + '].selection'}"
                               value="like" checked>
                    </td>
                    <td>
                        <input class="form-check-input" type="radio"
                               th:name="${'preferences[' + stat.index + '].selection'}"
                               value="dislike">
                    </td>
                    <input type="hidden"
                           th:name="${'preferences[' + stat.index + '].preferenceOptionId'}"
                           th:value="${opt.preferenceId}">
                </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save Preferences</button>
            <a href="/customers" class="btn btn-outline-secondary">Back</a>
        </div>
    </form>
</div>
</body>
</html>
